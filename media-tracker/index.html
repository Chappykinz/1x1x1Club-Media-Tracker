<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tracker Club</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <header class="glass-header">
            <div class="logo">
                <span class="gradient-text">Media</span>Tracker
            </div>
            <nav id="month-nav">
                <!-- Navigation inserted by JS -->
            </nav>
            <div class="header-actions" style="display: flex; gap: 1rem;">
                <button id="stats-btn" class="btn-secondary">Stats</button>
                <button id="add-month-btn" class="btn-primary">+ New Month</button>
            </div>
        </header>

        <main id="main-content" class="fade-in">
            <!-- Dynamic content goes here -->
        </main>
    </div>

    <!-- Modals -->
    <div id="new-month-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2>Add New Month</h2>
            <form id="new-month-form">
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label>Month</label>
                        <select id="month-select-input" required>
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label>Year</label>
                        <select id="year-select-input" required>
                            <option value="2020">2020</option>
                            <option value="2021">2021</option>
                            <option value="2022">2022</option>
                            <option value="2023">2023</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026" selected>2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mode</label>
                    <select id="month-mode-input">
                        <option value="regular">Regular (Everyone picks their own)</option>
                        <option value="dictator">Dictator (One person picks for all)</option>
                    </select>
                </div>
                <div class="form-group hidden" id="dictator-select-group">
                    <label>Who is the Dictator?</label>
                    <select id="dictator-name-input">
                        <option value="Andrew">Andrew</option>
                        <option value="Tom">Tom</option>
                        <option value="Ross">Ross</option>
                        <option value="Sean">Sean</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancel-new-month">Cancel</button>
                    <button type="submit" class="btn-primary">Create</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
